<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi novia?</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffebee;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        .container {
            text-align: center;
            z-index: 10;
        }łø
        h1 {
            color: #d81b60;
            margin-bottom: 30px;
        }
        .btn {
            padding: 10px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-yes {
            background-color: #4caf50;
            color: white;
        }
        .btn-no {
            background-color: #f44336;
            color: white;
            position: absolute;
        }
        .btn-yes:hover {
            background-color: #388e3c;
            transform: scale(1.1);
        }
        .message {
            margin-top: 20px;
            font-size: 24px;
            color: #d81b60;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¿Quieres ser mi novia?</h1>
        <button class="btn btn-yes" id="yesBtn">Sí</button>
        <button class="btn btn-no" id="noBtn">No</button>
        <div class="message" id="message">¡Lo sabía! Te amo mucho ❤</div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const message = document.getElementById('message');
        
        yesBtn.addEventListener('click', function() {
            message.style.display = 'block';
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';
            document.querySelector('h1').style.display = 'none';
        });
        
        // Función para mover el botón "No" aleatoriamente por toda la pantalla
        function moveNoBtn() {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
        
        // Mover el botón "No" cada 0.5 segundos (500ms)
        setInterval(moveNoBtn, 500);
        
        // También moverlo si el cursor se acerca
        noBtn.addEventListener('mouseover', function() {
            moveNoBtn();
        });
    </script>
</body>
</html>
